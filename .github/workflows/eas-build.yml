name: EAS Build
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Install and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Fix app.config.ts syntax
        run: |
          sed -i '/^[[:space:]]*,$/d' app.config.ts
          if ! grep -q "projectId" app.config.ts; then
            sed -i 's/experiments: {/extra: {\n    eas: {\n      projectId: "4ee45e5d-073e-437c-97d0-5225c76e575c",\n    },\n  },\n  experiments: {/' app.config.ts
          fi

      - name: Create .env file
        run: |
          touch .env
          echo "NODE_ENV=production" >> .env

      - name: Install dependencies
        run: npm install -g pnpm && pnpm install

      - name: Build Android
        env:
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"
          NODE_ENV: production
        run: eas build --platform android --profile production --non-interactive --no-wait


